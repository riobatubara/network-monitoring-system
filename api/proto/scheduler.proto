syntax = "proto3";

package scheduler;

option go_package = "./api/proto/scheduler;scheduler";

import "google/protobuf/timestamp.proto";

// Service handling metrics collection and check tasks
service TaskCoordinator {
  // Client-to-Server stream for processing normalized metrics
  rpc StreamMetrics(stream MetricPayload) returns (MetricsSummaryResponse);
}

// Normalized event payload generated by workers
message MetricPayload {
  string job_id = 1;
  string target = 2;
  string protocol = 3;
  string status = 4;        // e.g., "SUCCESS", "FAILED"
  int64 latency_ms = 5;
  string payload = 6;       // Raw error text or unmarshaled RESTCONF response
  google.protobuf.Timestamp timestamp = 7;
  string collector_id = 8;  // Identifies which remote machine ran the check
}

message MetricsSummaryResponse {
  int64 total_processed = 1;
  bool success = 2;
}
