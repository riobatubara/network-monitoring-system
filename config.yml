server:
  grpc_port: 50051
  db:
    postgres_dsn: "host=postgres user=postgres password=secret dbname=netmon sslmode=disable"
    redis_addr: "redis:6379"
    victoriametrics_url: "http://victoriametrics:8428/api/v1/write"

collector:
  id: "collector-idn-west-jkt-1"
  server_address: "server:50051"
  worker_count: 10
  buffer_size: 1000
  rate_limit_ms: 100
  polling_interval_sec: 5
